name: Test Suite

on:
  push:
    branches:
      - main
      - 'sdd/**'
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          if [ -d "TFTSet4Gym" ] && [ -f "TFTSet4Gym/setup.py" ]; then pip install -e TFTSet4Gym; fi

      - name: Run pytest on new test files
        run: |
          PYTHONPATH=. pytest tests/test_n_step_bootstrap.py \
                 tests/test_model_refactor.py \
                 tests/test_metrics.py \
                 tests/test_dynamics_zero_reward.py \
                 tests/test_benchmark_suite.py \
                 -v --timeout=120

  benchmark:
    runs-on: [self-hosted, gpu]
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify CUDA availability
        run: |
          CONDA=/home/lobo/miniconda3/bin/conda
          NVIDIA_SMI=/usr/lib/wsl/lib/nvidia-smi
          echo "Checking CUDA availability..."
          $NVIDIA_SMI || (echo "ERROR: nvidia-smi failed - GPU not accessible" && exit 1)
          $CONDA run -n TFT python -c "import torch; assert torch.cuda.is_available(), 'CUDA not available'; print(f'GPU: {torch.cuda.get_device_name(0)}')"

      - name: Link submodule dependencies
        run: |
          CONDA=/home/lobo/miniconda3/bin/conda
          if [ -d "TFTSet4Gym" ] && [ -f "TFTSet4Gym/setup.py" ]; then
            $CONDA run -n TFT pip install -e TFTSet4Gym
          fi
          if [ -d "MonteCarloTreeSearch" ] && [ -f "MonteCarloTreeSearch/setup.py" ]; then
            $CONDA run -n TFT pip install -e MonteCarloTreeSearch || (cd MonteCarloTreeSearch && $CONDA run -n TFT python setup.py build_ext --inplace)
          fi

      - name: Run GPU speedup benchmark test
        run: |
          /home/lobo/miniconda3/bin/conda run -n TFT pytest tests/test_batch_benchmark.py -v

      - name: Run benchmark suite
        run: |
          mkdir -p benchmarks/results
          /home/lobo/miniconda3/bin/conda run -n TFT python -m benchmarks.run_benchmark \
            --num-games 1 \
            --steps-per-game 20 \
            --agent-setup muzero_vs_random \
            --mcts-simulations 5 \
            --output benchmarks/results/ci-benchmark.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/results/ci-benchmark.json
