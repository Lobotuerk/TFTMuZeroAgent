name: Test Suite

on:
  push:
    branches: [main, 'sdd/**', 'feature/**', 'fix/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-timeout
          pip install -r requirements.txt

      - name: Run tests with pytest
        run: |
          pytest tests/test_n_step_bootstrap.py tests/test_model_refactor.py tests/test_metrics.py tests/test_dynamics_zero_reward.py -v --timeout=120 --tb=short
